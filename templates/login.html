<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QianDao V2 Login</title>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="login-body">
    <form class="login-card" method="post" action="/login">
        <span class="eyebrow">Protected</span>
        <h1>Sign in to QianDao V2</h1>
        <p>The control panel is protected. Enter your password to continue.</p>
        {{ if .Error }}
        <div class="error-box">{{ .Error }}</div>
        {{ end }}
        <label class="field">
            <span>Password</span>
            <input name="password" type="password" required autofocus>
        </label>
        <button class="primary full-width" type="submit">Enter control panel</button>
    </form>
</body>
</html>
