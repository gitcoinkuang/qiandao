<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QianDao V2 登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/app.css?v=20260326c">
</head>
<body class="login-body">
    <div class="page-orb page-orb-a"></div>
    <div class="page-orb page-orb-b"></div>

    <div class="login-shell">
        <section class="login-intro">
            <span class="eyebrow intro-eyebrow">Secure Access</span>
            <h1>登录 QianDao V2</h1>
            <p>进入自动签到控制台，统一查看任务健康、调度策略、推送状态与历史记录。</p>
            <div class="login-points">
                <div class="login-point">
                    <strong>任务统一管理</strong>
                    <span>保存 Curl 配置、定时执行与批量运行。</span>
                </div>
                <div class="login-point">
                    <strong>秒级调度支持</strong>
                    <span>适合零点签到与需要卡点执行的场景。</span>
                </div>
                <div class="login-point">
                    <strong>默认访问保护</strong>
                    <span>密码门禁适合公网和长期托管部署。</span>
                </div>
            </div>
        </section>

        <form class="login-card" method="post" action="/login">
            <span class="eyebrow login-card-eyebrow">安全登录</span>
            <h2>进入控制台</h2>
            <p>当前控制台已启用访问保护，请输入密码后继续。</p>
            {{ if .Error }}
            <div class="error-box">{{ .Error }}</div>
            {{ end }}
            <label class="field">
                <span>密码</span>
                <input name="password" type="password" required autofocus>
            </label>
            <button class="primary full-width" type="submit">进入控制台</button>
        </form>
    </div>
</body>
</html>
